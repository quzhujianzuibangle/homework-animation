<!DOCTYPE html>
     <head>
        <title>
        距离约束链
        </title>
        <script src="victor.min.js">

        </script>
    </head>
    <body>
        <canvas id="mycanvas" width=800px height=600px style="background-color:aliceblue;
        border-style:solid;border-width:1px;border-color:#aaaaaa;">        
        
        </canvas>
        <script>
            let canvas = document.getElementById("mycanvas");//设定好canvas
            let ctx = canvas.getContext("2d");//规定ctx在哪，这里是在canvas上
            
            
            let mouse_position= new Victor(canvas.width/2,canvas.height/2);
            //默认鼠标位置
            
            
            let default_color="#000000";//默认颜色为黑色
            //圆
            class  Ball{
                constructor(position,radius){
                    this.position=position;
                    this.radius=radius;
                    this.color=default_color;
                }
                fill(){
                    ctx.beginPath();
                    ctx.arc(this.position.x,this.position.y,this.radius,0,Math.PI*2);
                    ctx.fillStyle=this.color;
                    ctx.fill();
                    ctx.closePath();
                }//填充园
                stroke(){
                    ctx.beginPath();
                    ctx.arc(this.position.x,this.position.y,this.radius,0,Math.PI*2);
                    ctx.fillStyle=this.color;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.closePath();
                }//线圆
            }

            let max_length= 30;//最大约束距离；

            //let big_ball=new Ball(mouse_position,max_length);
            //let small_ball=new Ball(mouse_position,8);

            let num_points=21;//约束链节点数量

            //大圆数组
            let big_balls=[];
            //小圆数组
            let small_balls=[];

            for(var i=0;i<num_points;i++){
                big_balls.push(new Ball(mouse_position,max_length));
                small_balls.push(new Ball(mouse_position,8));
            }
            //初始化约束链的圆

            function draw(){
               for(var i=0;i<num_points;i++){
                   big_balls[i].stroke();
                   small_balls[i].fill();
               }
            }
            //画的代码

            function update(){
                for(var i=0;i<num_points;i++){
                    if(i===0){
                        big_balls[i].position = mouse_position;
                        small_balls[i].position = mouse_position;
                    } 
                    //第一个圆
                    else {
                        big_balls[i].position = small_balls[i-1].position;
                        small_balls[i].position = Constrain_distance(small_balls[i].position,big_balls[i-1].position,max_length);
                    }
                    //后续的圆
                }
            }
            //更新数据

            function animation(){
                ctx.clearRect(0,0,canvas.width,canvas.height);//清除画板上的所有东西
                update();
                draw();
                requestAnimationFrame(animation);
            }//动画代码，重复画的行为

            canvas.addEventListener('mousemove',function(event){
                mouse_position = getcanvasmouse_position(event);
            });//鼠标监听事件

            function getcanvasmouse_position(){
                const rect=canvas.getBoundingClientRect();
                const x=event.clientX-rect.left;
                const y=event.clientY-rect.top;
                return new Victor(x,y);
            }
            //算出鼠标在幕布中的位置

            function Constrain_distance(position_A,position_B,distance){
                return position_A.clone().subtract(position_B).normalize().multiplyScalar(distance).add(position_B);

            }
            //约束距离的函数，position_A是被约束的点，position_B是约束点，distance是最大约束距离


            animation();


        </script>
    </body>
</html>
