<!DOCTYPE html>
     <head>
        <title>
        距离约束链
        </title>
        <script src="victor.min.js">

        </script>
    </head>
    <body>
        <canvas id="mycanvas" width=800px height=600px style="background-color:aliceblue;
        border-style:solid;border-width:1px;border-color:#aaaaaa;">        
        </canvas>
        <script>
            let canvas = document.getElementById("mycanvas");//设定好canvas
            let ctx = canvas.getContext("2d");//规定ctx在哪，这里是在canvas上
            
            let mouse_position= new Victor(canvas.width/2,canvas.height/2);
            //默认鼠标位置
            
            
            let default_color="#000000";//默认颜色为黑色
            //圆
            class  Ball{
                constructor(position,radius){
                    this.position=position;
                    this.radius=radius;
                    this.color=default_color;
                }
                fill(){
                    ctx.beginPath();
                    ctx.arc(this.position.x,this.position.y,this.radius,0,Math.PI*2);
                    ctx.fillStyle=this.color;
                    ctx.fill();
                    ctx.closePath();
                }//填充园
                stroke(){
                    ctx.beginPath();
                    ctx.arc(this.position.x,this.position.y,this.radius,0,Math.PI*2);
                    ctx.fillStyle=this.color;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.closePath();
                }//线圆

                tangentpoint(pre_point){
                    //当前圆方向上的向量
                    let a1=pre_point.clone().subtract(this.position).normalize().multiplyScalar(this.radius);

                    let angle_1=a1.clone().rotate(Math.PI/2);
                    let angle_2=a1.clone().rotate(-Math.PI/2);

                    this.p1=this.position.clone().add(angle_1);
                    this.p2=this.position.clone().add(angle_2);

                    //绘制切点连线
                    ctx.beginPath();
                    ctx.arc(this.p1.x,this.p1.y,2,0,Math.PI*2);
                    ctx.fillStyle="red";
                    ctx.fill();
                    ctx.closePath();
                    ctx.beginPath();
                    ctx.arc(this.p2.x,this.p2.y,2,0,Math.PI*2);
                    ctx.fillStyle="red";
                    ctx.fill();
                    ctx.closePath();
                }
                //找切点
            }

            let max_length= 34;//最大约束距离；

            //let big_ball=new Ball(mouse_position,max_length);
            //let small_ball=new Ball(mouse_position,8);

            let num_points=12;//约束链节点数量
            let click_mouse=false;//鼠标点击状态

            //大圆数组
            let big_balls=[];
            //小圆数组
            let small_balls=[];

            for(var i=0;i<num_points;i++){
                if(i<=num_points/3){
                    small_balls.push(new Ball(mouse_position,15+i));
                }
                else{
                    small_balls.push(new Ball(mouse_position,10+num_points-i));
                }
                big_balls.push(new Ball(mouse_position,max_length));
            }
            //初始化约束链的圆

            function draw(){
               for(var i=0;i<num_points;i++){
                   if(click_mouse){
                    big_balls[i].stroke();
                   }     
                   small_balls[i].stroke();
                   if(i>0){
                    draw_line(small_balls[i].position,small_balls[i-1].position); 
                    small_balls[i].tangentpoint(small_balls[i-1].position);
                    //绘制切点
                    ctx.beginPath();
                    ctx.arc(small_balls[i].p1.x,small_balls[i].p1.y,2,0,Math.PI*2);
                    ctx.fillStyle="red";
                    ctx.fill();
                    ctx.closePath();
                    ctx.beginPath();
                    ctx.arc(small_balls[i].p2.x,small_balls[i].p2.y,2,0,Math.PI*2);
                    ctx.fillStyle="red";
                    ctx.fill();
                    ctx.closePath();
                    //连前后切点
                    if(i>1){
                        draw_line(small_balls[i].p1, small_balls[i-1].p1);
                        draw_line(small_balls[i].p2, small_balls[i-1].p2);
                    }
                   }
               }
            }
            //画的代码

            function update(){
                for(var i=0;i<num_points;i++){
                    if(i===0){
                        big_balls[i].position = mouse_position;
                        small_balls[i].position = mouse_position;
                    } 
                    //第一个圆
                    else {
                        small_balls[i].position = Constrain_distance(small_balls[i].position,big_balls[i-1].position,max_length);
                        big_balls[i].position = small_balls[i].position;
                    }
                    //后续的圆
                }
            }  
            //更新数据

            function animation(){
                ctx.clearRect(0,0,canvas.width,canvas.height);//清除画板上的所有东西
                update();
                draw();
                requestAnimationFrame(animation);
            }//动画代码，重复画的行为

            canvas.addEventListener('mousemove',function(event){
                mouse_position = getcanvasmouse_position(event);
            });
            //鼠标监听事件
            
            canvas.addEventListener('mousedown',function(event){
                 click_mouse=true;
            });
             canvas.addEventListener('mouseup',function(event){
                 click_mouse=false;
            });
            //鼠标点击触发事件

            function getcanvasmouse_position(){
                const rect=canvas.getBoundingClientRect();
                const x=event.clientX-rect.left;
                const y=event.clientY-rect.top;
                return new Victor(x,y);
            }
            //算出鼠标在幕布中的位置

            function Constrain_distance(position_A,position_B,distance){
                return position_A.clone().subtract(position_B).normalize().multiplyScalar(distance).add(position_B);

            }
            //约束距离的函数，position_A是被约束的点，position_B是约束点，distance是最大约束距离
            
            function draw_line(position_A,position_B){
                ctx.beginPath();
                ctx.moveTo(position_A.x,position_A.y);
                ctx.lineTo(position_B.x,position_B.y);
                ctx.strokeStyle=default_color;
                ctx.lineWidth = 1;
                ctx.lineCap = "round";
                ctx.stroke();
                ctx.closePath();
            }
            //画线的函数


            animation();


        </script>
    </body>
</html>
