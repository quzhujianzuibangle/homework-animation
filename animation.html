<!DOCTYPE html>
     <head>
        <title>
        基础距离约束
        </title>
        <script src="victor.min.js">

        </script>
    </head>
    <body>
        <canvas id="mycanvas" width=800px height=600px style="background-color:aliceblue;
        border-style:solid;border-width:1px;border-color:#aaaaaa;">        
        
        </canvas>
        <script>

            let defualt_color="#000000";//默认颜色为黑色
            //圆
            class  Ball{
                constructor(position,radius){
                    this.position=position;
                    this.radius=radius;
                    this.color=defualt_color;
                }
                fill(){
                    ctx.beginPath();
                    ctx.arc(this.position.x,this.position.y,this.radius,0,Math.PI*2);
                    ctx.fillStyle=this.color;
                    ctx.fill();
                    ctx.closePath();
                }//填充园
                stroke(){
                    ctx.beginPath();
                    ctx.arc(this.position.x,this.position.y,this.radius,0,Math.PI*2);
                    ctx.fillStyle=this.color;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.closePath();
                }//线圆
            }

            let max_length= 80;//最大约束距离；

            let big_ball=new Ball(new Victor(100,100),max_length);
            let small_ball=new Ball(new Victor(100,100),20);

            function draw(){
               big_ball.stroke();
               small_ball.fill();
            }//画的代码

            function animation(){
                ctx.clearRect(0,0,canvas.width,canvas.height);//清除画板上的所有东西

                draw();
                requestAnimationFrame(animation);
            }//动画代码，重复画的行为

            animation();

        </script>
    </body>
</html>
